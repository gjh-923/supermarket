function doAdjustPoints(mid) {
    const adj = parseInt(document.getElementById('frmAdjPoints').value)||0;
    const note = document.getElementById('frmAdjNote').value.trim();
    if(adj===0) { alert('调整数量不能为0'); return; }
    const members = loadData('members');
    const m = members.find(x=>x.id===mid);
    if(!m) return;
    if(m.points + adj < 0) { alert('积分不足，调整后不能为负数'); return; }
    m.points += adj;
    saveData('members', members);
    const records = loadData('memberPointsRecords');
    records.push({id:makeId(), memberId:m.id, memberName:m.name, type:adj>0?'积分调整(增加)':'积分调整(减少)', points:adj, balance:m.points, time:new Date().toLocaleString(), operator:currentUser.name, note:note||'管理员调整'});
    saveData('memberPointsRecords', records);
    closeModal();
    refreshCurrentTable();
    addLog(`积分调整: ${m.name} ${adj>0?'+':''}${adj}`);
    showToast(`积分调整成功，${m.name} 当前积分: ${m.points}`);
}
function exchangePoints(m) {
    const exchangeOptions = loadData('exchangeRewards').filter(r=>r.enabled!==false).map(r=>({points:r.points, reward:r.name, type:r.type, rewardId:r.id}));
    const optionsHtml = exchangeOptions.filter(o=>m.points>=o.points).map(o=>`<option value="${o.points}" data-type="${o.type||'coupon'}" data-pid="${o.productId||''}" data-pname="${o.productName||''}">${o.reward} (需${o.points}积分)</option>`).join('');
    openModal('积分兑换 - '+m.name, `
        <p>当前积分: <strong style="color:#2b6e3c;">${m.points}</strong></p>
        <div class="form-field"><label>选择兑换奖品</label><select id="frmExPoints" style="width:100%;">${optionsHtml}</select></div>
        ${m.points<100 ? '<p style="color:#c23d2e;font-size:0.8rem;">积分不足100，无法兑换</p>' : ''}
        <p style="color:#819e73;font-size:0.75rem;margin-top:8px;">兑换后将生成兑换记录，积分立即扣除</p>`,
        `<button class="btn btn-outline" onclick="closeModal()">取消</button><button class="btn btn-primary" onclick="doExchangePoints(${m.id})" ${m.points<100?'disabled':''}>确认兑换</button>`);
}
function doExchangePoints(mid) {
    const sel = document.getElementById('frmExPoints');
    const ex = parseInt(sel.value)||0;
    const selOption = sel.selectedOptions[0];
    const rewardType = selOption?.dataset?.type || 'coupon';
    const productId = selOption?.dataset?.pid || '';
    const productName = selOption?.dataset?.pname || '';
    if(ex<=0) { alert('请选择兑换奖品'); return; }
    const members = loadData('members');
    const m = members.find(x=>x.id===mid);
    if(!m||ex>m.points) { alert('积分不足'); return; }
    const rewardsDb = loadData('exchangeRewards');
    const foundReward = rewardsDb.find(r=>r.points===ex);
    let reward = foundReward ? foundReward.name : (ex/100+'元代金券');
    if (rewardType === 'product' && productName) {
        reward = '商品: ' + productName;
    }
    m.points -= ex;
    saveData('members', members);
    const records = loadData('memberPointsRecords');
    records.push({id:makeId(), memberId:m.id, memberName:m.name, type:'积分兑换', points:-ex, balance:m.points, time:new Date().toLocaleString(), operator:currentUser.name, note:'兑换'+reward});
    saveData('memberPointsRecords', records);
    // If product exchange, reduce stock
    if (rewardType === 'product' && productId) {
        const products = loadData('products');
        const prod = products.find(p=>String(p.id)===String(productId));
        if (prod) {
            prod.stock = Math.max(0, prod.stock - 1);
            saveData('products', products);
        }
    }
    closeModal();
    refreshCurrentTable();
    addLog(`积分兑换: ${m.name} 使用${ex}积分兑换${reward}`);
    showToast(`兑换成功！获得 ${reward}，剩余积分: ${m.points}`);
}
function clearMemberPoints(m) {
    if(m.points<=0) { showToast('该会员当前没有积分'); return; }
    if(!confirm(`确定清零会员"${m.name}"的全部积分吗？\n当前积分: ${m.points}\n此操作不可恢复！`)) return;
    if(!confirm(`再次确认：将清零 ${m.name} 的 ${m.points} 积分`)) return;
    const members = loadData('members');
    const member = members.find(x=>x.id===m.id);
    if(!member) return;
    const oldPoints = member.points;
    member.points = 0;
    saveData('members', members);
    const records = loadData('memberPointsRecords');
    records.push({id:makeId(), memberId:member.id, memberName:member.name, type:'积分清零', points:-oldPoints, balance:0, time:new Date().toLocaleString(), operator:currentUser.name, note:'管理员执行积分清零'});
    saveData('memberPointsRecords', records);
    refreshCurrentTable();
    addLog(`积分清零: ${member.name} 清空 ${oldPoints} 积分`);
    showToast(`积分已清零，${member.name} 扣减 ${oldPoints} 积分`);
}
function batchClearPoints() {
    const members = loadData('members').filter(m=>m.points>0);
    if(members.length===0) { showToast('没有有积分的会员需要清零'); return; }
    let html = `<p style="margin-bottom:12px;color:#819e73;">选择要清零积分的会员（当前${members.length}人有积分）</p>
    <table class="data-table" style="min-width:400px;"><thead><tr><th><input type="checkbox" id="clearAllCheck" onchange="document.querySelectorAll('.clear-mem-cb').forEach(cb=>cb.checked=this.checked)"> 全选</th><th>姓名</th><th>手机号</th><th>等级</th><th>当前积分</th></tr></thead><tbody>
    ${members.map(m=>`<tr><td><input type="checkbox" class="clear-mem-cb" value="${m.id}"></td><td>${m.name}</td><td>${m.phone}</td><td>${m.level}</td><td style="font-weight:600;color:#2b6e3c;">${m.points}</td></tr>`).join('')}
    </tbody></table>`;
    openModal('批量积分清零', html,
        `<button class="btn btn-outline" onclick="closeModal()">取消</button><button class="btn btn-danger" onclick="doBatchClearPoints()">确认清零</button>`);
}
function doBatchClearPoints() {
    const selected = [...document.querySelectorAll('.clear-mem-cb:checked')].map(cb=>parseInt(cb.value));
    if(selected.length===0) { alert('请选择至少一个会员'); return; }
    const members = loadData('members');
    const records = loadData('memberPointsRecords');
    let totalCleared = 0;
    selected.forEach(mid => {
        const m = members.find(x=>x.id===mid);
        if(m && m.points>0) {
            totalCleared += m.points;
            records.push({id:makeId(), memberId:m.id, memberName:m.name, type:'积分清零', points:-m.points, balance:0, time:new Date().toLocaleString(), operator:currentUser.name, note:'批量积分清零'});
            m.points = 0;
        }
    });
    saveData('members', members);
    saveData('memberPointsRecords', records);
    closeModal();
    refreshCurrentTable();
    addLog(`批量积分清零: ${selected.length}位会员, 共${totalCleared}积分`);
    showToast(`已清零 ${selected.length} 位会员共 ${totalCleared} 积分`);
}

function addPurchase() {
    const suppliers = loadData('suppliers');
    const products = loadData('products');
    const activeSuppliers = suppliers.filter(s=>s.status!=='暂停');
    if (activeSuppliers.length === 0) {
        alert('暂无可用的供应商（所有供应商均处于暂停状态），请先恢复供应商合作状态。');
        return;
    }
    openModal('新增采购单', `
        <div class="form-row"><div class="form-field"><label>供应商</label><select id="frmPoSupplier">${activeSuppliers.map(s=>`<option value="${s.name}">${s.name}${s.status==='合作中'?'':s.status==='暂停'?' [已暂停]':''}</option>`).join('')}</select></div><div class="form-field"><label>商品</label><select id="frmPoProduct">${products.map(p=>`<option value="${p.id}">${p.name}</option>`).join('')}</select></div></div>
        <div class="form-row"><div class="form-field"><label>数量</label><input type="number" id="frmPoQty" value="1" min="1"></div><div class="form-field"><label>单价</label><input type="number" id="frmPoPrice" step="0.01" value="0"></div></div>`,
        `<button class="btn btn-outline" onclick="closeModal()">取消</button><button class="btn btn-primary" onclick="savePurchase()">确认入库</button>`);
}
function savePurchase() {
    const orders = loadData('purchaseOrders');
    const pid = parseInt(document.getElementById('frmPoProduct').value);
    const products = loadData('products');
    const p = products.find(x=>x.id===pid);
    const qty = parseInt(document.getElementById('frmPoQty').value)||0;
    const price = parseFloat(document.getElementById('frmPoPrice').value)||0;
    if(qty<=0) { alert('数量必须大于0'); return; }
    const supplierName = document.getElementById('frmPoSupplier').value;
    // 检查供应商状态：暂停的供应商不允许采购
    const suppliers = loadData('suppliers');
    const supplier = suppliers.find(s=>s.name===supplierName);
    if (supplier && supplier.status === '暂停') {
        alert(`供应商"${supplierName}"当前状态为"暂停"（合同已到期），无法创建采购订单。请联系管理员恢复合作。`);
        return;
    }
    // 检查供应商有效合同
    const contracts = loadData('supplierContracts');
    const validContract = contracts.find(c=>c.supplierName===supplierName && (c.status==='生效中'||c.status==='即将到期'));
    if (!validContract) {
        alert(`供应商"${supplierName}"没有生效中的合同（合同已到期或不存在），无法创建采购订单。`);
        return;
    }
    const order = {
        id: makeId(), orderNo: 'PO'+Date.now(), supplier: supplierName,
        productId: pid, productName: p?.name||'', qty, price,
        amount: qty*price, date: getToday(), purchaser: currentUser.name
    };
    orders.push(order);
    saveData('purchaseOrders', orders);
    if(p) { p.stock += qty; p.purchasePrice = price; }
    saveData('products', products);
    // 同步写入库存流水记录，使仓库概览可查看
    const records = loadData('inventoryRecords');
    records.push({id:makeId(),productId:pid,productName:p?.name||'',type:'入库',qty,note:'采购入库 '+order.orderNo,time:new Date().toLocaleString(),operator:currentUser.name});
    saveData('inventoryRecords', records);
    closeModal();
    refreshCurrentTable();
    addLog(`采购入库: ${order.orderNo}, ${p?.name} +${qty}`);
    showToast(`采购入库成功！${p?.name} 库存 +${qty}`);
}
function viewPurchase(o) {
    openModal('采购单详情 - '+o.orderNo,
        `<div style="font-size:0.85rem;"><p><strong>单号:</strong> ${o.orderNo}</p><p><strong>供应商:</strong> ${o.supplier}</p><p><strong>商品:</strong> ${o.productName}</p><p><strong>数量:</strong> ${o.qty}</p><p><strong>单价:</strong> ¥${formatMoney(o.price)}</p><p><strong>金额:</strong> ¥${formatMoney(o.amount)}</p><p><strong>日期:</strong> ${o.date}</p><p><strong>采购员:</strong> ${o.purchaser}</p></div>`,
        `<button class="btn btn-outline" onclick="closeModal()">关闭</button>`);
}

function writeOff(p) {
    openModal('库存核销 - '+p.name, `
        <p>当前库存: <strong>${p.stock}</strong> | 到期日期: ${p.expiryDate}</p>
        <div class="form-field"><label>核销数量</label><input type="number" id="frmWoQty" min="1" max="${p.stock}" value="${p.stock}"></div>
        <div class="form-field"><label>核销原因</label><select id="frmWoReason"><option>过期</option><option>损坏</option><option>损耗</option><option>其他</option></select></div>`,
        `<button class="btn btn-outline" onclick="closeModal()">取消</button><button class="btn btn-primary" onclick="doWriteOff(${p.id})">确认核销</button>`);
}
function doWriteOff(pid) {
    const qty = parseInt(document.getElementById('frmWoQty').value)||0;
    if(qty<=0) { alert('数量必须大于0'); return; }
    const products = loadData('products');
    const p = products.find(x=>x.id===pid);
    if(!p || qty>p.stock) { alert('库存不足'); return; }
    p.stock -= qty;
    saveData('products', products);
    const records = loadData('inventoryRecords');
    records.push({id:makeId(),productId:pid,productName:p.name,type:'核销',qty:-qty,note:document.getElementById('frmWoReason').value,time:new Date().toLocaleString(),operator:currentUser.name});
    saveData('inventoryRecords', records);
    closeModal();

function executeCheck(t) {
    if(t.status==='已完成') { showToast('该任务已完成'); return; }
    const products = loadData('products');
    const filteredProducts = t.scope==='全库' ? products : products;
    let html = `<div style="font-size:0.8rem;margin-bottom:12px;">盘点单号: <strong>${t.taskNo}</strong> | 范围: ${t.scope}</div>
    <table class="data-table" style="min-width:600px;"><thead><tr><th>商品名称</th><th>账面库存</th><th>实盘数量</th><th>差异</th><th>备注</th></tr></thead><tbody>`;
    filteredProducts.forEach(p => {
        html += `<tr>
            <td>${p.name}</td>
            <td>${p.stock}</td>
            <td><input type="number" id="chk_${p.id}" value="${p.stock}" style="width:80px;padding:4px;border-radius:8px;border:1px solid #dde6d4;" data-book="${p.stock}"></td>
            <td><span id="diff_${p.id}" style="font-weight:600;">0</span></td>
            <td><input id="note_${p.id}" placeholder="差异说明" style="width:100px;padding:4px;border-radius:8px;border:1px solid #dde6d4;"></td>
        </tr>`;
    });
    html += `</tbody></table>
    <scr` + `ipt>
        document.querySelectorAll('[id^=chk_]').forEach(inp => {
            inp.addEventListener('input', function() {
                const book = parseInt(this.dataset.book)||0;
                const actual = parseInt(this.value)||0;
                const diff = actual - book;
                const diffEl = document.getElementById('diff_'+this.id.replace('chk_',''));
                diffEl.textContent = diff;
                diffEl.style.color = diff===0 ? '#2a7a3b' : (diff>0 ? '#2b6e3c' : '#c23d2e');
            });
        });
    </scr` + `ipt>`;
    openModal('执行盘点 - '+t.taskNo, html,
        `<button class="btn btn-outline" onclick="closeModal()">暂存</button><button class="btn btn-primary" onclick="submitCheckResult('${t.id}')">提交盘点结果</button>`);
}
function submitCheckResult(taskId) {
    const tasks = loadData('inventoryCheckTasks');
    const task = tasks.find(x=>x.id===taskId);
    if(!task) return;
    const products = loadData('products');
    const items = [];
    products.forEach(p => {
        const actualEl = document.getElementById('chk_'+p.id);
        if(!actualEl) return;
        const book = p.stock;
        const actual = parseInt(actualEl.value)||0;
        const diff = actual - book;
        const note = document.getElementById('note_'+p.id)?.value||'';
        items.push({productId:p.id, productName:p.name, bookQty:book, actualQty:actual, diff, note});
    });
    task.items = items;
    task.status = '已完成';
    task.completeTime = new Date().toLocaleString();
    saveData('inventoryCheckTasks', tasks);

    const discrepancies = items.filter(i=>i.diff!==0);
    if(discrepancies.length > 0) {
        discrepancies.forEach(d => {
            const p = products.find(x=>x.id===d.productId);
            if(p) p.stock = d.actualQty;
        });
        saveData('products', products);
    }
    closeModal();
    refreshCurrentTable();
    addLog(`完成盘点: ${task.taskNo}, 差异项: ${discrepancies.length}`);
    showToast(`盘点完成！差异项: ${discrepancies.length} 个，库存已更新`);
}
function viewCheckTask(t) {
    let html = `<div style="font-size:0.85rem;"><p><strong>盘点单号:</strong> ${t.taskNo}</p><p><strong>日期:</strong> ${t.checkDate}</p><p><strong>范围:</strong> ${t.scope}</p><p><strong>状态:</strong> ${t.status}</p><p><strong>盘点人:</strong> ${t.checker}</p><p><strong>备注:</strong> ${t.note||'无'}</p></div>`;
    if(t.items && t.items.length>0) {
        html += `<hr style="border-color:#edf3e7;margin:12px 0;"><h4 style="margin-bottom:8px;">盘点明细</h4>
        <table class="data-table" style="min-width:400px;"><thead><tr><th>商品</th><th>账面</th><th>实盘</th><th>差异</th><th>备注</th></tr></thead><tbody>
        ${t.items.map(i=>`<tr><td>${i.productName}</td><td>${i.bookQty}</td><td>${i.actualQty}</td><td style="color:${i.diff===0?'#2a7a3b':'#c23d2e'};font-weight:600;">${i.diff>0?'+':''}${i.diff}</td><td>${i.note||''}</td></tr>`).join('')}
        </tbody></table>`;
    }
    openModal('盘点详情 - '+t.taskNo, html, `<button class="btn btn-outline" onclick="closeModal()">关闭</button>`);
}

pageRenderers['inventory_alert'] = function() {
    const products = loadData('products');
    const settings = loadData('inventoryAlertSettings');
    const alerts = [];
    products.forEach(p => {
        const catSetting = settings.find(s=>s.productCategory===p.category) || settings.find(s=>s.productCategory==='全部');
        if(!catSetting||!catSetting.enabled) return;
        if(p.stock < catSetting.minStock) alerts.push({...p,alertType:'库存不足',threshold:catSetting.minStock,alertMsg:`低于安全库存(${catSetting.minStock})`});
        else if(p.stock > catSetting.maxStock) alerts.push({...p,alertType:'库存过高',threshold:catSetting.maxStock,alertMsg:`超过上限(${catSetting.maxStock})`});
        if(p.expiryDate) {
            const diff = Math.ceil((new Date(p.expiryDate)-new Date())/(1000*60*60*24));
            if(diff>=0 && diff<=catSetting.expiryDays) alerts.push({...p,alertType:'临期预警',threshold:catSetting.expiryDays,alertMsg:`距到期还有${diff}天`});
        }
    });
    return `

function showProfitMarginDetail() {
    const orders = loadData('salesOrders');
    const pOrders = loadData('purchaseOrders');
    const ledger = loadData('financeLedger');
    const totalRevenue = orders.reduce((s,o)=>s+o.totalAmount,0) + ledger.filter(l=>l.amount>0&&l.type!=='销售收入').reduce((s,l)=>s+l.amount,0);
    const totalCost = pOrders.reduce((s,o)=>s+o.amount,0) + ledger.filter(l=>l.type==='采购支出').reduce((s,l)=>s+Math.abs(l.amount),0);
    const totalExpense = ledger.filter(l=>l.amount<0&&l.type==='费用支出').reduce((s,l)=>s+Math.abs(l.amount),0);
    const netProfit = totalRevenue - totalCost - totalExpense;
    const profitMargin = totalRevenue > 0 ? (netProfit/totalRevenue*100).toFixed(1) : '0.0';
    const costRatio = totalRevenue > 0 ? (totalCost/totalRevenue*100).toFixed(1) : '0.0';
    const expenseRatio = totalRevenue > 0 ? (totalExpense/totalRevenue*100).toFixed(1) : '0.0';
    let assessment = '';
    if(profitMargin >= 15) assessment = '优秀 — 盈利能力强劲，成本控制良好';
    else if(profitMargin >= 8) assessment = '良好 — 处于行业平均水平，仍有优化空间';
    else if(profitMargin >= 3) assessment = '一般 — 利润率偏低，建议控制成本或提升售价';
    else if(profitMargin >= 0) assessment = '预警 — 利润率极低，需立即采取措施';
    else assessment = '亏损 — 当前处于亏损状态，需紧急调整经营策略';
    openModal('净利率分析',
        `<div style="font-size:0.85rem;">
            <div style="text-align:center;padding:20px;background:#f9fcf5;border-radius:16px;margin-bottom:16px;">
                <div style="font-size:0.75rem;color:#6d8f6a;">净利率</div>
                <div style="font-size:2.5rem;font-weight:700;color:${profitMargin>=5?'#2a7a3b':'#c23d2e'};">${profitMargin}%</div>
                <div style="font-size:0.8rem;color:#819e73;margin-top:4px;">${assessment}</div>
            </div>
            <table style="width:100%;border-collapse:collapse;font-size:0.82rem;">
                <tr style="background:#f9fcf5;"><td style="padding:10px 12px;font-weight:600;">分析指标</td><td style="padding:10px 12px;font-weight:600;text-align:right;">金额</td><td style="padding:10px 12px;font-weight:600;text-align:right;">占营收比</td></tr>
                <tr><td style="padding:8px 12px;">营业收入</td><td style="padding:8px 12px;text-align:right;">¥${formatMoney(totalRevenue)}</td><td style="padding:8px 12px;text-align:right;">100%</td></tr>
                <tr><td style="padding:8px 12px;">营业成本</td><td style="padding:8px 12px;text-align:right;color:#c23d2e;">¥${formatMoney(totalCost)}</td><td style="padding:8px 12px;text-align:right;">${costRatio}%</td></tr>
                <tr><td style="padding:8px 12px;">期间费用</td><td style="padding:8px 12px;text-align:right;color:#c23d2e;">¥${formatMoney(totalExpense)}</td><td style="padding:8px 12px;text-align:right;">${expenseRatio}%</td></tr>
                <tr style="border-top:2px solid #e2ecd9;font-weight:700;"><td style="padding:12px 12px;">净利润</td><td style="padding:12px 12px;text-align:right;color:${netProfit>=0?'#2a7a3b':'#c23d2e'};">¥${formatMoney(netProfit)}</td><td style="padding:12px 12px;text-align:right;">${profitMargin}%</td></tr>
            </table>
            <div style="margin-top:16px;padding:12px;background:#f9fcf5;border-radius:12px;font-size:0.75rem;color:#5e7a5a;">
                <strong>分析建议：</strong><br>
                • 成本率${costRatio}%，${costRatio>70?'偏高，建议优化采购渠道':'处于合理范围'}<br>
                • 费用率${expenseRatio}%，${expenseRatio>20?'偏高，建议控制各项费用支出':'控制良好'}<br>
                • 当前销售订单数: ${orders.length} 笔，采购单数: ${pOrders.length} 笔
            </div>
        </div>`,
        `<button class="btn btn-outline" onclick="closeModal()">关闭</button>
         <button class="btn btn-primary" onclick="closeModal();navigateTo('finance_profit')">查看利润表</button>
         <button class="btn btn-outline" onclick="closeModal();navigateTo('finance_cost')">查看成本核算</button>`);
}

function init_finance_report() {

function saveLedgerEntry() {
    const ledger = loadData('financeLedger');
    const data = {
        id: makeId(),
        date: document.getElementById('frmLgrDate').value,
        type: document.getElementById('frmLgrType').value,
        category: document.getElementById('frmLgrCategory').value,
        amount: parseFloat(document.getElementById('frmLgrAmount').value)||0,
        account: document.getElementById('frmLgrAccount').value,
        summary: document.getElementById('frmLgrSummary').value.trim(),
        voucherNo: document.getElementById('frmLgrVoucher').value.trim()
    };
    if(!data.summary) { alert('请输入摘要'); return; }
    ledger.push(data);
    saveData('financeLedger', ledger);
    closeModal();
    refreshCurrentTable();
    addLog(`新增资金流水: ${data.voucherNo} ${data.summary}`);
    showToast('资金流水已添加');
}

// -- 成本核算 --
pageRenderers['finance_cost'] = function() {
    const products = loadData('products');
    const salesOrders = loadData('salesOrders');
    const pOrders = loadData('purchaseOrders');
    const now = new Date();
    window._costPeriod = window._costPeriod || 'month';
    window._costYear = window._costYear || now.getFullYear();
    window._costMonth = window._costMonth || (now.getMonth()+1);
    window._costDay = window._costDay || now.getDate();
    const period = window._costPeriod;
    const selYear = window._costYear;
    const selMonth = window._costMonth;
    const selDay = window._costDay;

    function inPeriod(o) {
        const d = new Date(o.time || o.date);
        if (period === 'day') return d.getFullYear()===selYear && (d.getMonth()+1)===selMonth && d.getDate()===selDay;
        if (period === 'month') return d.getFullYear()===selYear && (d.getMonth()+1)===selMonth;
        if (period === 'year') return d.getFullYear()===selYear;
        return false;
    }

    const filteredSales = salesOrders.filter(o => inPeriod(o));
    let totalCost = 0, totalRevenue = 0;
    const prodCost = {}; // productId -> {name, category, qty, cost, price}
    const catCost = {};  // category -> cost

    filteredSales.forEach(order => {
        totalRevenue += order.totalAmount || 0;
        (order.items || []).forEach(item => {
            const product = products.find(p => p.id === item.productId);
            const unitCost = product ? product.purchasePrice : 0;
            const itemCost = unitCost * (item.qty || 0);
            totalCost += itemCost;
            const pid = item.productId;
            if (!prodCost[pid]) prodCost[pid] = { name: item.name || (product?.name||''), category: product?.category || '未知', qty: 0, cost: 0, price: unitCost };
            prodCost[pid].qty += item.qty || 0;
            prodCost[pid].cost += itemCost;
            const cat = product?.category || '未知';
            catCost[cat] = (catCost[cat] || 0) + itemCost;
        });
    });

    const grossProfit = totalRevenue - totalCost;
    const grossMargin = totalRevenue > 0 ? (grossProfit / totalRevenue * 100).toFixed(1) : '0';
    const catEntries = Object.entries(catCost).sort((a,b) => b[1] - a[1]);
    const maxCatCost = catEntries.length > 0 ? catEntries[0][1] : 1;
    const prodEntries = Object.values(prodCost).sort((a,b) => b.cost - a.cost);

    // Trend: last 6 periods
    const trendData = [];
    for (let i = 5; i >= 0; i--) {
        let label = ''; let tCost = 0; let tRev = 0;
        if (period === 'day') {
            const d2 = new Date(selYear, selMonth-1, selDay - i);
            label = (d2.getMonth()+1)+'/'+d2.getDate();
            salesOrders.forEach(o => {
                const od = new Date(o.time);
                if (od.getFullYear()===d2.getFullYear() && od.getMonth()===d2.getMonth() && od.getDate()===d2.getDate()) {
                    tRev += o.totalAmount||0;
                    (o.items||[]).forEach(item => {
                        const p = products.find(pp => pp.id===item.productId);
                        tCost += (p?p.purchasePrice:0) * (item.qty||0);
                    });
                }
            });
        } else if (period === 'month') {
            const m2 = selMonth - i; const y2 = selYear + (m2<=0 ? Math.floor((m2-1)/12) : 0);
            const mn2 = ((m2-1)%12+12)%12 + 1;
            label = y2+'/'+mn2;
            salesOrders.forEach(o => {
                const od = new Date(o.time);
                if (od.getFullYear()===y2 && (od.getMonth()+1)===mn2) {
                    tRev += o.totalAmount||0;
                    (o.items||[]).forEach(item => {
                        const p = products.find(pp => pp.id===item.productId);
                        tCost += (p?p.purchasePrice:0) * (item.qty||0);
                    });
                }
            });
        } else {
            const y2 = selYear - i; label = String(y2);
            salesOrders.forEach(o => {
                const od = new Date(o.time);
                if (od.getFullYear()===y2) {
                    tRev += o.totalAmount||0;
                    (o.items||[]).forEach(item => {
                        const p = products.find(pp => pp.id===item.productId);
                        tCost += (p?p.purchasePrice:0) * (item.qty||0);
                    });
                }
            });
        }
        trendData.push({ label, cost: tCost, revenue: tRev });
    }

    const periodLabel = period==='day' ? selYear+'-'+String(selMonth).padStart(2,'0')+'-'+String(selDay).padStart(2,'0') : period==='month' ? selYear+'-'+String(selMonth).padStart(2,'0') : String(selYear);

    return `
    <div class="page active">
        <div class="page-header"><div><h1>成本核算</h1><div class="breadcrumb">财务管理 / 成本核算</div></div></div>
        <div class="page-body">
            <div style="background:white;border-radius:20px;padding:14px 20px;box-shadow:0 2px 8px rgba(0,0,0,0.04);margin-bottom:12px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;">
                <span style="font-weight:600;color:#1f3b2c;font-size:0.85rem;">会计期间：</span>
                <div class="btn-group" id="periodBtns">
                    <button class="btn ${period==='day'?'btn-primary':'btn-outline'}" onclick="setCostPeriod('day')">日</button>
                    <button class="btn ${period==='month'?'btn-primary':'btn-outline'}" onclick="setCostPeriod('month')">月</button>
                    <button class="btn ${period==='year'?'btn-primary':'btn-outline'}" onclick="setCostPeriod('year')">年</button>
                </div>
                <span style="font-weight:600;color:#426b39;font-size:0.9rem;" id="periodLabel">${periodLabel}</span>
                <button class="btn btn-outline" onclick="shiftCostPeriod(-1)">◀ 上${period==='day'?'日':period==='month'?'月':'年'}</button>
                <button class="btn btn-outline" onclick="shiftCostPeriod(1)">下${period==='day'?'日':period==='month'?'月':'年'} ▶</button>
                ${period!=='year'?`<input type="number" id="costYearInput" value="${selYear}" style="width:70px;padding:6px 10px;border-radius:12px;border:1px solid #dde6d4;" min="2020" max="2099">`:''}
                ${period==='day'?`<input type="number" id="costMonthInput" value="${selMonth}" style="width:50px;padding:6px 10px;border-radius:12px;border:1px solid #dde6d4;" min="1" max="12">`:''}
                ${period!=='year'?`<button class="btn btn-outline" onclick="jumpCostPeriod()">跳转</button>`:''}
            </div>
            <div style="background:#f0f7e8;border:1px solid #b8d9a4;border-radius:14px;padding:10px 16px;margin-bottom:12px;display:flex;align-items:center;gap:8px;font-size:0.78rem;color:#426b39;">
                <span style="font-size:1.1rem;">ℹ️</span>
                <span>成本数据由系统自动计算生成，来源为<strong>采购入库</strong>与<strong>销售出库</strong>数据（出库数量×商品成本价=当期成本），按会计期间独立核算不跨期累加，全程无人工干预。</span>
            </div>
            <div class="dashboard-grid">
                <div class="stat-card"><div class="stat-icon">📉</div><div class="stat-num" style="color:#c23d2e;">¥${formatMoney(totalCost)}</div><div class="stat-label">当期总成本</div></div>
                <div class="stat-card"><div class="stat-icon">💰</div><div class="stat-num" style="color:#2a7a3b;">¥${formatMoney(totalRevenue)}</div><div class="stat-label">当期销售额</div></div>
                <div class="stat-card"><div class="stat-icon">📊</div><div class="stat-num" style="color:${grossProfit>=0?'#2a7a3b':'#c23d2e'};">¥${formatMoney(grossProfit)}</div><div class="stat-label">毛利润</div></div>
                <div class="stat-card"><div class="stat-icon">🎯</div><div class="stat-num" style="color:${grossMargin>=10?'#2a7a3b':grossMargin>=0?'#b87c1a':'#c23d2e'};">${grossMargin}%</div><div class="stat-label">毛利率</div></div>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:12px;">
                <div style="background:white;border-radius:20px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,0.04);">
                    <h3 style="color:#1f3b2c;font-size:0.9rem;margin-bottom:12px;">商品品类成本占比</h3>
                    ${catEntries.length===0 ? '<p style="color:#819e73;font-size:0.78rem;">当期无销售数据</p>' : catEntries.map(([cat, cost]) => {
                        const pct = totalCost>0?(cost/totalCost*100).toFixed(1):'0';
                        return `<div style="margin-bottom:8px;"><div style="display:flex;justify-content:space-between;font-size:0.75rem;margin-bottom:2px;"><span>${cat}</span><span style="color:#426b39;">¥${formatMoney(cost)} (${pct}%)</span></div><div class="rank-bar"><div class="rank-bar-fill" style="width:${Math.max(cost/maxCatCost*100,2)}%;background:linear-gradient(90deg,#3b9e5c,#5cb85c);"></div></div></div>`;
                    }).join('')}
                </div>
                <div style="background:white;border-radius:20px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,0.04);">
                    <h3 style="color:#1f3b2c;font-size:0.9rem;margin-bottom:12px;">成本趋势（近6${period==='day'?'日':period==='month'?'个月':'年'}）</h3>
                    <div style="display:flex;align-items:flex-end;gap:8px;height:160px;padding:0 4px;">
                        ${trendData.map(t => {
                            const maxVal = Math.max(...trendData.map(d=>Math.max(d.cost,d.revenue)), 1);
                            const costH = Math.max(t.cost/maxVal*140, 2);
                            const revH = Math.max(t.revenue/maxVal*140, 2);
                            return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;">
                                <div style="display:flex;flex-direction:column;align-items:center;gap:1px;width:100%;">
                                    <div title="销售额 ¥${formatMoney(t.revenue)}" style="width:60%;background:#5cb85c;border-radius:3px 3px 0 0;height:${revH}px;min-height:2px;"></div>
                                    <div title="成本 ¥${formatMoney(t.cost)}" style="width:60%;background:#c23d2e;border-radius:3px 3px 0 0;height:${costH}px;min-height:2px;"></div>
                                </div>
                                <span style="font-size:0.6rem;color:#819e73;margin-top:4px;">${t.label}</span>
                            </div>`;
                        }).join('')}
                    </div>
                    <div style="display:flex;gap:16px;justify-content:center;margin-top:6px;font-size:0.68rem;">
                        <span><span style="display:inline-block;width:10px;height:10px;background:#5cb85c;border-radius:2px;vertical-align:middle;margin-right:4px;"></span>销售额</span>
                        <span><span style="display:inline-block;width:10px;height:10px;background:#c23d2e;border-radius:2px;vertical-align:middle;margin-right:4px;"></span>成本</span>
                    </div>
                </div>
            </div>
            <div style="background:white;border-radius:20px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,0.04);margin-bottom:12px;">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
                    <h3 style="color:#1f3b2c;font-size:0.95rem;">当期销售商品成本明细</h3>
                    <div class="search-area"><input type="text" placeholder="搜索商品名称..." oninput="filterCostTable(this.value)" autocomplete="off"></div>

                    <tbody>${prodEntries.length===0 ? `<tr><td colspan="6" style="text-align:center;color:#819e73;padding:24px;">当期无销售出库数据，暂无成本记录</td></tr>` : prodEntries.map(e=>{
                        const pct = totalCost>0?(e.cost/totalCost*100).toFixed(1):'0';
                        const invAttrs = canAccess('inventory') ? `style="cursor:pointer;color:#2b6e3c;font-weight:500;" onclick="navigateTo('inventory');setTimeout(()=>document.querySelector('input[placeholder*=\\\'搜索\\\']')?.value='${e.name}',500);" title="点击查看库存"` : 'style="color:#819e73;"';
                        return `<tr><td ${invAttrs}>${e.name}</td><td>${e.category}</td><td>¥${formatMoney(e.price)}</td><td>${e.qty}</td><td style="color:#c23d2e;font-weight:500;">¥${formatMoney(e.cost)}</td><td>${pct}%</td></tr>`;
                    }).join('')}</tbody>
                </table>
            </div>
            <div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap;">
                <button class="btn btn-outline" ${btnLink('finance')}>💼 财务核算</button>

                <button class="btn btn-outline" ${btnLink('finance_profit')}>📈 利润表</button>
            </div>
        </div>
    </div>
    <scr` + `ipt>
    window.filterCostTable = function(term) {
        var rows = document.querySelectorAll('#costTable tbody tr');

        rows.forEach(function(r) { r.style.display = t===''||r.cells[0].textContent.toLowerCase().includes(t) ? '' : 'none'; });
    };
    window.setCostPeriod = function(p) {
        window._costPeriod = p;
        if (p==='year') delete window._costMonth;
        if (p==='year'||p==='month') delete window._costDay;
        navigateTo('finance_cost');

        var p = window._costPeriod;
        if (p==='day') {
            var d = new Date(window._costYear, window._costMonth-1, window._costDay + dir);
            window._costYear = d.getFullYear(); window._costMonth = d.getMonth()+1; window._costDay = d.getDate();
        } else if (p==='month') {
            window._costMonth += dir;
            while (window._costMonth > 12) { window._costYear++; window._costMonth -= 12; }

        } else {
            window._costYear += dir;

        var y = parseInt(document.getElementById('costYearInput')?.value) || window._costYear;

        window._costYear = y;

        if (window._costPeriod==='day') { window._costMonth = m; window._costDay = window._costDay || 1; }

    };

        `<button class="btn btn-outline" onclick="closeModal()">取消</button><button class="btn btn-primary" onclick="saveTax()">保存</button>`);
}
function saveTax() {
    const taxes = loadData('financeTax');
    const id = document.getElementById('frmTaxId')?.value;
    const base = parseFloat(document.getElementById('frmTaxBase').value)||0;
    const rate = parseFloat(document.getElementById('frmTaxRate').value)||0;
    const data = {
        id: id || (taxes.length?Math.max(...taxes.map(t=>t.id))+1:1),
        taxName: document.getElementById('frmTaxName').value.trim(),
        taxRate: rate,
        taxableAmount: base,
        taxAmount: base * rate / 100,
        period: document.getElementById('frmTaxPeriod').value.trim(),
        status: document.getElementById('frmTaxStatus').value,
        dueDate: document.getElementById('frmTaxDue').value
    };
    if(!data.taxName) { alert('税种不能为空'); return; }
    if(id) { const idx = taxes.findIndex(t=>t.id==id); if(idx!==-1) taxes[idx]=data; }
    else taxes.push(data);

function declareTax(t) {
    if(t.status==='已申报') { showToast('该项已申报'); return; }
    if(!confirm(`确认申报"${t.taxName}" - ¥${formatMoney(t.taxAmount)} 吗？`)) return;
    const taxes = loadData('financeTax');
    const tax = taxes.find(x=>x.id===t.id);
    if(tax) tax.status = '已申报';
    saveData('financeTax', taxes);
    // Add tax payment to ledger
    const ledger = loadData('financeLedger');
    ledger.push({
        id: makeId(), date: getToday(), type: '费用支出', category: '管理费用',
        amount: -tax.taxAmount, account: '银行存款',
        summary: `缴纳${tax.taxName}(${tax.period})`, voucherNo: 'TAX'+Date.now()
    });
    saveData('financeLedger', ledger);
    refreshCurrentTable();
    addLog(`税务申报: ${tax.taxName} ¥${formatMoney(tax.taxAmount)}`);
    showToast(`"${tax.taxName}" 申报成功！`);
}
function deleteTax(t) {
    if(!confirm(`确定删除"${t.taxName}"吗？`)) return;
    let taxes = loadData('financeTax');
    taxes = taxes.filter(x=>x.id!==t.id);
    saveData('financeTax', taxes);
    refreshCurrentTable();
    addLog(`删除税务项: ${t.taxName}`);
    showToast('已删除');
}

// -- 排班管理 --
let scheduleYear, scheduleMonth;
pageRenderers['employee_schedule'] = function() {
    const now = new Date();
    if (!scheduleYear) { scheduleYear = now.getFullYear(); scheduleMonth = now.getMonth() + 1; }
    const firstDay = new Date(scheduleYear, scheduleMonth - 1, 1);
    const lastDay = new Date(scheduleYear, scheduleMonth, 0);
    const startDayOfWeek = firstDay.getDay();
    const daysInMonth = lastDay.getDate();
    const schedules = loadData('schedules');
    const employees = loadData('employees');
    const dayNames = ['日','一','二','三','四','五','六'];
    let gridHtml = dayNames.map(d=>`<div class="schedule-cell header">${d}</div>`).join('');
    for (let i=0; i<startDayOfWeek; i++) { gridHtml += '<div class="schedule-cell" style="background:#fafafa;"></div>'; }
    for (let d=1; d<=daysInMonth; d++) {
        const dateStr = `${scheduleYear}-${String(scheduleMonth).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const daySchedules = schedules.filter(s=>s.schedule_date===dateStr);
        let tagsHtml = '';
        daySchedules.forEach(s=>{
            const emp = employees.find(e=>e.id===s.employee_id);
            if (emp) tagsHtml += `<span class="shift-tag shift-${s.shift_type||'休息'}">${emp.name} ${s.shift_type||'休息'}</span>`;
        });
        gridHtml += `<div class="schedule-cell" onclick="openScheduleDay('${dateStr}')"><div class="day-num">${d}</div>${tagsHtml}</div>`;
    }
    const monthStr = `${scheduleYear}-${String(scheduleMonth).padStart(2,'0')}`;
    const monthSchedules = schedules.filter(s => (s.schedule_date || '').startsWith(monthStr));
    // Build per-employee summary
    const empSummary = employees.map(e => {
        const eSchs = monthSchedules.filter(s => String(s.employee_id) === String(e.id));
        const counts = { '早班': 0, '中班': 0, '晚班': 0, '休息': 0 };
        eSchs.forEach(s => { if (counts[s.shift_type] !== undefined) counts[s.shift_type]++; });
        return { emp: e, counts, total: eSchs.length, daysInMonth };
    });
    let empTableHtml = empSummary.map(es => {
        const { emp, counts } = es;
        const scheduledDays = counts['早班'] + counts['中班'] + counts['晚班'] + counts['休息'];
        const unscheduled = daysInMonth - scheduledDays;
        return `<tr>
            <td><b>${emp.name}</b></td>
            <td>${emp.dept || '-'}</td>
            <td>${emp.position || '-'}</td>
            <td><span class="shift-tag shift-早班">早班</span> ${counts['早班']}天</td>
            <td><span class="shift-tag shift-中班">中班</span> ${counts['中班']}天</td>
            <td><span class="shift-tag shift-晚班">晚班</span> ${counts['晚班']}天</td>
            <td><span class="shift-tag shift-休息">休息</span> ${counts['休息']}天</td>
            <td style="color:${unscheduled > 0 ? '#c23d2e' : '#819e73'};">${unscheduled > 0 ? '未排' + unscheduled + '天' : '✓ 已完成'}</td>
            <td><button class="btn btn-outline" style="font-size:0.65rem;padding:2px 8px;" onclick="event.stopPropagation();viewEmpSchedule('${emp.id}','${emp.name}')">详情</button></td>
        </tr>`;

function exportSchedule() {
    const schedules = loadData('schedules');
    const monthStr = `${scheduleYear}-${String(scheduleMonth).padStart(2,'0')}`;
    const monthSchedules = schedules.filter(s=>s.schedule_date.startsWith(monthStr));
    const employees = loadData('employees');
    const daysInMonth = new Date(scheduleYear, scheduleMonth, 0).getDate();
    // Build CSV
    let csv = '﻿员工姓名,部门,岗位,日期,班次\n';
    monthSchedules.forEach(s=>{
        const emp = employees.find(e=>e.id===s.employee_id);
        csv += `${s.employee_name},${emp?.dept||''},${emp?.position||''},${s.schedule_date},${s.shift_type}\n`;
    });
    // Build summary
    let summary = `\n排班统计 (${monthStr})\n`;
    summary += '员工姓名,早班天数,中班天数,晚班天数,休息天数\n';
    employees.forEach(e=>{
        const eSchs = monthSchedules.filter(s=>String(s.employee_id)===String(e.id));
        const counts = {早班:0,中班:0,晚班:0,休息:0};
        eSchs.forEach(s=>{ if(counts[s.shift_type]!==undefined) counts[s.shift_type]++; });
        summary += `${e.name},${counts.早班},${counts.中班},${counts.晚班},${counts.休息}\n`;
    });
    const blob = new Blob([csv + '\n' + summary], {type:'text/csv;charset=utf-8'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `排班表_${monthStr}.csv`;
    a.click();
    URL.revokeObjectURL(url);
    addLog(`导出排班表: ${monthStr}`);
    showToast(`排班表已导出: ${monthStr}`);
}
function applyBatchSchedule() {
    const fromDay = parseInt(document.getElementById('batchFromDay').value);
    const toDay = parseInt(document.getElementById('batchToDay').value);
    const shift = document.getElementById('batchShift').value;
    const repeat = document.getElementById('batchRepeat').value;
    const employees = loadData('employees');
    if(fromDay > toDay) { alert('起始日期不能大于结束日期'); return; }
    let schedules = loadData('schedules');
    const allShifts = [];
    for (let d=fromDay; d<=toDay; d++) {
        const dateObj = new Date(scheduleYear, scheduleMonth - 1, d);
        const dayOfWeek = dateObj.getDay();
        if (repeat==='weekday' && (dayOfWeek===0||dayOfWeek===6)) continue;
        if (repeat==='weekend' && dayOfWeek!==0 && dayOfWeek!==6) continue;
        const dateStr = `${scheduleYear}-${String(scheduleMonth).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        schedules = schedules.filter(s=>s.schedule_date!==dateStr);
        employees.forEach(e=>{
            const rec = {
                id: makeId(), employee_id: e.id, employee_name: e.name,
                schedule_date: dateStr, shift_type: shift, created_at: new Date().toISOString()
            };
            schedules.push(rec);
            allShifts.push(rec);
        });
    }
    saveData('schedules', schedules);
    closeModal();
    navigateTo('employee_schedule');
    addLog(`批量排班: ${scheduleYear}-${scheduleMonth} ${fromDay}-${toDay}日 ${shift}`);
    showToast('批量排班已应用');
    // API 同步（分批发送）
    if (_apiToken && allShifts.length > 0) {
        const batchSize = 50;
        for (let i = 0; i < allShifts.length; i += batchSize) {
            const chunk = allShifts.slice(i, i + batchSize);
            const dateStr = chunk[0].schedule_date;
            _apiSaveScheduleBatch(dateStr, chunk).catch(e => console.warn('API批量排班失败:', e.message));
        }
    }
}

function init_employee_salary() {}
function autoCalcSalary() {
    const employees = loadData('employees');
    let salaries = loadData('salaries');
    let attendances = loadData('attendances');
    const thisMonth = new Date().toISOString().slice(0,7);
    salaries = salaries.filter(s=>s.salary_month!==thisMonth);
    employees.forEach(emp=>{
        const monthAtt = attendances.filter(a=>String(a.employee_id)===String(emp.id)&&(a.att_date||'').startsWith(thisMonth));
        const workDays = monthAtt.filter(a=>a.status==='正常').length;
        const lateDays = monthAtt.filter(a=>a.status==='迟到').length;
        const earlyDays = monthAtt.filter(a=>a.status==='早退').length;
        const absentDays = monthAtt.filter(a=>a.status==='旷工').length;
        const overtimeDays = monthAtt.filter(a=>a.status==='加班').length;
        const baseSalary = 5000;
        const overtimePay = overtimeDays * 200;
        const deduction = lateDays * 50 + earlyDays * 50 + absentDays * 300;
        const total = Math.max(0, baseSalary + overtimePay - deduction);
        salaries.push({
            id: makeId(), employee_id: emp.id, employee_name: emp.name,
            salary_month: thisMonth, base_salary: baseSalary, overtime_pay: overtimePay,
            bonus: 0, deduction, work_days: workDays, overtime_days: overtimeDays,
            late_days: lateDays, early_days: earlyDays, absent_days: absentDays,
            total, created_at: new Date().toISOString()
        });
    });
    saveData('salaries', salaries);
    navigateTo('employee_salary');
    addLog(`自动计算工资: ${thisMonth}`);
    showToast(`${thisMonth} 工资已自动计算完成`);
}
function manualAddSalary() {
    const employees = loadData('employees');
    const empOpts = employees.map(e=>`<option value="${e.id}">${e.name} (${e.dept||''})</option>`).join('');
    const thisMonth = new Date().toISOString().slice(0,7);
    openModal('手动添加工资', `
        <div class="form-row"><div class="form-field"><label>员工</label><select id="frmSalEmp">${empOpts}</select></div>
        <div class="form-field"><label>月份</label><input type="month" id="frmSalMonth" value="${thisMonth}"></div></div>
        <div class="form-row"><div class="form-field"><label>底薪</label><input type="number" id="frmSalBase" value="5000" step="0.01"></div>
        <div class="form-field"><label>加班费</label><input type="number" id="frmSalOT" value="0" step="0.01"></div></div>
        <div class="form-row"><div class="form-field"><label>奖金</label><input type="number" id="frmSalBonus" value="0" step="0.01"></div>
        <div class="form-field"><label>扣款</label><input type="number" id="frmSalDeduction" value="0" step="0.01"></div></div>
        <div class="form-row"><div class="form-field"><label>出勤天数</label><input type="number" id="frmSalWorkDays" value="22"></div></div>`,
        `<button class="btn btn-outline" onclick="closeModal()">取消</button><button class="btn btn-primary" onclick="saveManualSalary()">保存</button>`);
}
function saveManualSalary() {
    const employee_id = parseInt(document.getElementById('frmSalEmp').value);
    const employees = loadData('employees');
    const emp = employees.find(e=>e.id===employee_id);
    const month = document.getElementById('frmSalMonth').value;
    const base = parseFloat(document.getElementById('frmSalBase').value)||0;
    const ot = parseFloat(document.getElementById('frmSalOT').value)||0;
    const bonus = parseFloat(document.getElementById('frmSalBonus').value)||0;
    const deduction = parseFloat(document.getElementById('frmSalDeduction').value)||0;
    const workDays = parseInt(document.getElementById('frmSalWorkDays').value)||0;
    const total = base + ot + bonus - deduction;
    let salaries = loadData('salaries');
    salaries = salaries.filter(s=>!(String(s.employee_id)===String(employee_id)&&s.salary_month===month));
    salaries.push({
        id: makeId(), employee_id, employee_name: emp?.name||'',
        salary_month: month, base_salary: base, overtime_pay: ot,
        bonus, deduction, work_days: workDays, total,
        created_at: new Date().toISOString()
    });
    saveData('salaries', salaries);
    closeModal();
    navigateTo('employee_salary');
    addLog(`手动添加工资: ${emp?.name||''} ${month}`);
    showToast('工资记录已保存');

function saveSupplier() {
    const suppliers = loadData('suppliers');
    const id = document.getElementById('frmSupId')?.value;
    const name = document.getElementById('frmSupName').value.trim();
    if(!name) { alert('供应商名称不能为空'); return; }
    const data = {
        id: id ? parseInt(id) : (suppliers.length?Math.max(...suppliers.map(s=>s.id))+1:1),
        code: document.getElementById('frmSupCode').value.trim(),
        name,
        contact: document.getElementById('frmSupContact').value.trim(),
        phone: document.getElementById('frmSupPhone').value.trim(),
        email: document.getElementById('frmSupEmail').value.trim(),
        address: document.getElementById('frmSupAddr').value.trim(),
        products: document.getElementById('frmSupProducts').value.trim(),
        supplyCapacity: document.getElementById('frmSupCapacity').value.trim(),
        level: document.getElementById('frmSupLevel').value,
        status: document.getElementById('frmSupStatus').value,
        cooperationDate: document.getElementById('frmSupCoopDate').value,
        bankAccount: document.getElementById('frmSupBank').value.trim(),
        taxId: document.getElementById('frmSupTax').value.trim(),
        notes: document.getElementById('frmSupNotes').value.trim()
    };
    if(id) { const idx = suppliers.findIndex(s=>s.id==id); if(idx!==-1) suppliers[idx]=data; }
    else suppliers.push(data);
    saveData('suppliers', suppliers);
    // 同步更新商品中的供应商名称
    const oldName = id ? suppliers.find(s=>s.id==id)?.name : null;
    closeModal();
    refreshCurrentTable();
    addLog(`供应商操作: ${id?'编辑':'新增'} ${data.name}`);
    showToast(`供应商"${data.name}"已保存`);
}
function toggleSupplierStatus(s) {
    const suppliers = loadData('suppliers');
    const supplier = suppliers.find(x=>x.id===s.id);
    if(!supplier) return;
    const newStatus = supplier.status==='合作中'?'暂停':'合作中';
    const actionText = newStatus==='暂停'?'暂停合作':'恢复合作';
    if(!confirm(`确定${actionText}供应商"${supplier.name}"吗？`)) return;
    supplier.status = newStatus;
    saveData('suppliers', suppliers);
    refreshCurrentTable();
    addLog(`供应商${actionText}: ${supplier.name}`);
    showToast(`供应商"${supplier.name}"已${newStatus}`);
}
function deleteSupplier(s) {
    const products = loadData('products');
    const relatedProducts = products.filter(p=>p.supplier===s.name);
    const warnMsg = relatedProducts.length>0 ? `\n\n⚠️ 该供应商关联了 ${relatedProducts.length} 个商品，删除后这些商品的供应商信息将清空。` : '';
    if(!confirm(`确定删除供应商"${s.name}"(编号:${s.code})吗？${warnMsg}\n此操作不可恢复！`)) return;
    let suppliers = loadData('suppliers');
    suppliers = suppliers.filter(x=>x.id!==s.id);
    saveData('suppliers', suppliers);
    // 清空关联商品的供应商
    relatedProducts.forEach(p=>{p.supplier='';});
    saveData('products', products);
    refreshCurrentTable();
    addLog(`删除供应商: ${s.name}(${s.code})`);
    showToast('已删除');
}
function exportSuppliers() {
    const suppliers = loadData('suppliers');
    let csv = '编号,名称,联系人,电话,邮箱,地址,主营产品,等级,合作状态,合作日期,供应能力,银行账号,税号,备注\n';

    const blob = new Blob(['﻿'+csv], {type:'text/csv;charset=utf-8;'});

function saveContract() {
    const contracts = loadData('supplierContracts');
    const id = document.getElementById('frmContId')?.value;
    const supplierId = parseInt(document.getElementById('frmContSupplier').value);
    const supplier = loadData('suppliers').find(s=>s.id===supplierId);
    const expiryDate = document.getElementById('frmContExp').value;
    const today = getToday();
    const diff = Math.ceil((new Date(expiryDate)-new Date())/(1000*60*60*24));
    const status = diff < 0 ? '已到期' : diff === 0 ? '即将到期' : '生效中';
    const data = {
        id: id ? parseInt(id) : (contracts.length?Math.max(...contracts.map(c=>c.id))+1:1),
        supplierId, supplierName: supplier?.name||'',
        contractNo: document.getElementById('frmContNo').value.trim(),
        signDate: document.getElementById('frmContSign').value,
        expiryDate, amount: parseFloat(document.getElementById('frmContAmount').value)||0,
        status, type: document.getElementById('frmContType').value,
        paymentTerms: document.getElementById('frmContPay').value,
        scope: document.getElementById('frmContScope').value.trim(),
        attachment: document.getElementById('frmContAttach').value.trim(),
        notes: document.getElementById('frmContNotes').value.trim()
    };
    if(!data.contractNo||!data.supplierName) { alert('合同编号和供应商不能为空'); return; }
    if(id) { const idx = contracts.findIndex(c=>c.id==data.id); if(idx!==-1) contracts[idx]=data; }
    else contracts.push(data);
    saveData('supplierContracts', contracts);
    const origRenewId = document.getElementById('frmContOrigId')?.value;
    if (origRenewId) {
        const origIdx = contracts.findIndex(c=>String(c.id)===String(origRenewId));
        if (origIdx!==-1) { contracts[origIdx].status = '已续签'; saveData('supplierContracts', contracts); }
    }
    // Auto-sync supplier status with contract status
    syncContractSupplierStatus();
    closeModal();
    refreshCurrentTable();
    updateContractStats();
    addLog(`合同操作: ${origRenewId?'续签':id?'编辑':'新签'} ${data.contractNo}(${data.supplierName})`);
    showToast(`合同"${data.contractNo}"已保存`);
}
function renewContract(orig) {
    if (!orig || !orig.contractNo) { alert('合同数据异常，无法续签'); return; }
    var suppliers = loadData('suppliers');
    var newNo = orig.contractNo.replace(/HT\d+/, 'HT'+new Date().getFullYear()+String(Math.floor(Math.random()*9000)+1000));
    var contractTypes = ['年度框架合同','单次采购合同','长期供货协议','临时合同'];
    var payTerms = ['月结30天','月结15天','月结45天','款到发货','货到付款'];
    var typeOptions = '';
    for (var i = 0; i < contractTypes.length; i++) {
        typeOptions += '<option ' + (contractTypes[i]===orig.type?'selected':'') + '>' + contractTypes[i] + '</option>';
    }
    var payOptions = '';
    for (var i = 0; i < payTerms.length; i++) {
        payOptions += '<option ' + (payTerms[i]===orig.paymentTerms?'selected':'') + '>' + payTerms[i] + '</option>';
    }
    var bodyHtml = '<p style="margin-bottom:12px;color:#5e7a5a;">基于原合同 <strong>'+orig.contractNo+'</strong> ('+orig.supplierName+') 续签</p>';
    bodyHtml += '<input type="hidden" id="frmContId" value=""><input type="hidden" id="frmContOrigId" value="'+orig.id+'">';
    bodyHtml += '<div class="form-row"><div class="form-field"><label>供应商</label><input disabled value="'+orig.supplierName+'"><input type="hidden" id="frmContSupplier" value="'+orig.supplierId+'"></div><div class="form-field"><label>新合同编号</label><input id="frmContNo" value="'+newNo+'"></div></div>';
    bodyHtml += '<div class="form-row"><div class="form-field"><label>合同类型</label><select id="frmContType">'+typeOptions+'</select></div><div class="form-field"><label>合同金额</label><input type="number" id="frmContAmount" step="0.01" value="'+orig.amount+'"></div></div>';
    bodyHtml += '<div class="form-row"><div class="form-field"><label>签订日期</label><input type="date" id="frmContSign" value="'+getToday()+'"></div><div class="form-field"><label>到期日期</label><input type="date" id="frmContExp" value="'+getToday(365)+'"></div></div>';
    bodyHtml += '<div class="form-row"><div class="form-field"><label>付款条件</label><select id="frmContPay">'+payOptions+'</select></div><div class="form-field"><label>供应范围</label><input id="frmContScope" value="'+(orig.scope||'')+'"></div></div>';
    bodyHtml += '<div class="form-field"><label>备注</label><textarea id="frmContNotes" rows="2">续签自原合同 '+orig.contractNo+'，'+(orig.notes||'')+'</textarea></div>';
    openModal('续签合同 - '+orig.contractNo, bodyHtml, '<button class="btn btn-outline" onclick="closeModal()">取消</button><button class="btn btn-primary" onclick="saveContract()">确认续签</button>');
}
function syncContractSupplierStatus() {
    const contracts = loadData('supplierContracts');
    const suppliers = loadData('suppliers');
    let supplierChanged = false;
    suppliers.forEach(sup => {
        const supContracts = contracts.filter(c=>c.supplierId===sup.id);
        if (supContracts.length === 0) { sup.status = '未合作'; supplierChanged = true; return; }
        const hasActive = supContracts.some(c=>c.status==='生效中'||c.status==='即将到期');
        const allExpired = supContracts.every(c=>c.status==='已到期');
        const newStatus = allExpired ? '暂停' : hasActive ? '合作中' : '暂停';
        if (sup.status !== newStatus) { sup.status = newStatus; supplierChanged = true; }
    });
    if (supplierChanged) saveData('suppliers', suppliers);
}
function updateContractStats() {
    const contracts = loadData('supplierContracts');
    const elTotal = document.getElementById('statContractTotal');
    const elActive = document.getElementById('statContractActive');
    const elExpiring = document.getElementById('statContractExpiring');
    const elAmount = document.getElementById('statContractAmount');
    if (elTotal) elTotal.textContent = contracts.length;
    if (elAmount) elAmount.textContent = '¥'+formatMoney(contracts.reduce((s,c)=>s+(c.amount||0),0)/10000)+'万';
    if (elActive) elActive.textContent = contracts.filter(c=>c.status==='生效中').length;
    if (elExpiring) elExpiring.textContent = contracts.filter(c=>c.status==='即将到期').length;
}
function deleteContract(c) {
    if(!confirm(`确定删除合同"${c.contractNo}"(${c.supplierName})吗？`)) return;
    let contracts = loadData('supplierContracts');
    contracts = contracts.filter(x=>x.id!==c.id);
    saveData('supplierContracts', contracts);
    syncContractSupplierStatus();
    refreshCurrentTable();
    updateContractStats();
    addLog(`删除合同: ${c.contractNo}(${c.supplierName})`);
    showToast('已删除');
}

function updateEvalStats() {
    const evaluations = loadData('supplierEvaluations');
    const suppliers = loadData('suppliers');
    // 按供应商聚合平均评分
    const agg = {};
    evaluations.forEach(e => {
        if(!agg[e.supplierId]) agg[e.supplierId] = {name:e.supplierName, ratings:[], total:0};
        agg[e.supplierId].ratings.push(e.rating);
        agg[e.supplierId].total++;
    });
    const avgRatings = Object.values(agg).map(a=>({name:a.name, avg:(a.ratings.reduce((s,r)=>s+r,0)/a.ratings.length).toFixed(1), count:a.total}));
    avgRatings.sort((a,b)=>b.avg-a.avg);
    const top3 = avgRatings.slice(0,3);
    const totalEvals = evaluations.length;
    const avgAll = totalEvals>0 ? (evaluations.reduce((s,e)=>s+e.rating,0)/totalEvals).toFixed(1) : '0';
    const el = document.getElementById('evalStats');
    if(el) el.innerHTML = `
        <div class="stat-card"><div class="stat-icon">⭐</div><div class="stat-num">${totalEvals}</div><div class="stat-label">评价总数</div></div>
        <div class="stat-card"><div class="stat-icon">📊</div><div class="stat-num">${avgAll}</div><div class="stat-label">平均评分</div></div>
        ${top3.map((t,i)=>`<div class="stat-card" ${i===0?'style="border-left:4px solid #ffd700;"':''}><div class="stat-icon">${i===0?'🥇':i===1?'🥈':'🥉'}</div><div class="stat-num" style="font-size:1rem;">${t.name}</div><div class="stat-label">${t.avg}分 (${t.count}次评价)</div></div>`).join('')}`;
}

function saveEvaluation() {
    const evaluations = loadData('supplierEvaluations');
    const id = document.getElementById('frmEvalId')?.value;
    const supplierId = parseInt(document.getElementById('frmEvalSupplier').value);
    const supplier = loadData('suppliers').find(s=>s.id===supplierId);
    const quality = parseInt(document.getElementById('frmEvalQuality').value)||5;
    const delivery = parseInt(document.getElementById('frmEvalDelivery').value)||4;
    const price = parseInt(document.getElementById('frmEvalPrice').value)||4;
    const service = parseInt(document.getElementById('frmEvalService').value)||4;
    const rating = Math.round((quality+delivery+price+service)/4);
    const data = {
        id: id ? parseInt(id) : (evaluations.length?Math.max(...evaluations.map(e=>e.id))+1:1),
        supplierId, supplierName: supplier?.name||'',
        rating, quality, delivery, price, service,
        comment: document.getElementById('frmEvalComment').value.trim(),
        evaluator: currentUser.name,
        date: document.getElementById('frmEvalDate').value
    };
    if(!data.supplierName) { alert('请选择供应商'); return; }
    if(id) { const idx = evaluations.findIndex(e=>e.id==data.id); if(idx!==-1) evaluations[idx]=data; }
    else evaluations.push(data);
    saveData('supplierEvaluations', evaluations);
    closeModal();
    refreshCurrentTable();
    addLog(`供应商评价: ${data.supplierName} ${data.rating}分`);
    showToast(`"${data.supplierName}"评价已保存`);
}

function showEvalStats() {
    const evaluations = loadData('supplierEvaluations');
    const agg = {};
    evaluations.forEach(e => {
        if(!agg[e.supplierId]) agg[e.supplierId] = {name:e.supplierName, quality:0, delivery:0, price:0, service:0, rating:0, count:0};
        agg[e.supplierId].quality += e.quality;
        agg[e.supplierId].delivery += e.delivery;
        agg[e.supplierId].price += e.price;
        agg[e.supplierId].service += e.service;
        agg[e.supplierId].rating += e.rating;
        agg[e.supplierId].count++;
    });
    const stats = Object.values(agg).map(a=>({
        name:a.name, count:a.count,
        avgRating:(a.rating/a.count).toFixed(1),
        avgQuality:(a.quality/a.count).toFixed(1),
        avgDelivery:(a.delivery/a.count).toFixed(1),
        avgPrice:(a.price/a.count).toFixed(1),
        avgService:(a.service/a.count).toFixed(1)
    })).sort((a,b)=>b.avgRating-a.avgRating);
    const stars = r=>'★'.repeat(Math.round(r))+'☆'.repeat(5-Math.round(r));
    openModal('供应商评价统计', `
        ${stats.length>0 ? `<table class="data-table" style="min-width:500px;"><thead><tr><th>排名</th><th>供应商</th><th>评价次数</th><th>综合评分</th><th>质量</th><th>交付</th><th>价格</th><th>服务</th></tr></thead><tbody>
        ${stats.map((s,i)=>`<tr>
            <td>${i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1}</td>
            <td style="font-weight:600;">${s.name}</td><td>${s.count}</td>
            <td style="color:#ffd700;font-weight:600;">${stars(s.avgRating)} ${s.avgRating}</td>
            <td>${stars(s.avgQuality)} ${s.avgQuality}</td>
            <td>${stars(s.avgDelivery)} ${s.avgDelivery}</td>
            <td>${stars(s.avgPrice)} ${s.avgPrice}</td>
            <td>${stars(s.avgService)} ${s.avgService}</td>
        </tr>`).join('')}</tbody></table>` : '<p style="color:#819e73;">暂无评价数据</p>'}
        `,
        `<button class="btn btn-outline" onclick="closeModal()">关闭</button>`);
}

    const todayOps = ops.filter(l => l.time && (l.time.startsWith(todayISO) || l.time.startsWith(todayLocale))).length;
    const todayLogins = logins.filter(l => l.loginTime && l.loginTime.startsWith(todayISO)).length;
    const successLogins = logins.filter(l => l.status === '成功').length;
    const totalLogins = logins.length;
    const successRate = totalLogins > 0 ? Math.round(successLogins / totalLogins * 100) : 100;
    const el = document.getElementById('sysLogStatsRow');
    if (!el) return;
    el.innerHTML = `
        <div class="mini-stat"><div class="mini-icon">📝</div><div><div class="mini-val">${ops.length}</div><div class="mini-lbl">操作日志总数</div></div></div>

// -- 数据备份与恢复 --
pageRenderers['system_backup'] = function() {
    sysBakTab = 'backup';
    if (currentPage === 'system_backup') { currentPage = 'system_backup_mgmt'; return pageRenderers['system_backup_mgmt'](); }
    return pageRenderers['system_backup_mgmt']();
};
function backupData() {
    const allData = {};
    Object.keys(DEFAULT_DATA).forEach(k => { allData[k] = loadData(k); });
    const jsonStr = JSON.stringify(allData, null, 2);
    const blob = new Blob([jsonStr], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `超市管理系统备份_${getToday().replace(/-/g,'')}.json`; a.click();
    URL.revokeObjectURL(url);
    recordBackup('手动备份', jsonStr);
    addLog('数据备份导出（文件下载）');
    showToast('数据备份已下载');
}
function autoBackupData() {
    const allData = {};
    Object.keys(DEFAULT_DATA).forEach(k => { allData[k] = loadData(k); });
    const jsonStr = JSON.stringify(allData, null, 2);
    recordBackup('自动备份', jsonStr);
    addLog('数据自动备份（本地快照）');
    showToast('本地快照备份已完成');
}
function recordBackup(type, jsonStr) {
    const backups = JSON.parse(localStorage.getItem('sms_backupHistory')||'[]');
    backups.push({ id: makeId(), time: new Date().toLocaleString(), type, operator: currentUser?.name||'系统', size: (jsonStr.length/1024).toFixed(1)+'KB' });
    if (backups.length > 20) backups.splice(0, backups.length - 20);
    localStorage.setItem('sms_backupHistory', JSON.stringify(backups));
    if (currentPage === 'system_backup' || currentPage === 'system_backup_mgmt') { if (sysBakTab === 'backup') renderSysBakTabContent(); }
}
function deleteBackupRecord(id) {
    let backups = JSON.parse(localStorage.getItem('sms_backupHistory')||'[]');
    backups = backups.filter(b=>b.id!==id);
    localStorage.setItem('sms_backupHistory', JSON.stringify(backups));
    if (currentPage === 'system_backup_mgmt') { if (sysBakTab === 'backup') renderSysBakTabContent(); }
    showToast('备份记录已删除');
}
function restoreData(e) {
    const file = e.target.files[0];
    if(!file) return;
    if(!confirm('恢复数据将覆盖当前所有数据，确定继续吗？请确保已备份当前数据。')) return;
    const reader = new FileReader();
    reader.onload = function(ev) {
        try {
            const data = JSON.parse(ev.target.result);
            Object.keys(data).forEach(k => { if(DEFAULT_DATA.hasOwnProperty(k)) saveData(k, data[k]); });
            addLog('数据恢复完成（从备份文件）');
            showToast('数据恢复成功！即将刷新页面...');
            setTimeout(()=>location.reload(), 1500);
        } catch(err) { alert('备份文件格式错误，无法恢复'); }
    };
    reader.readAsText(file);
}
function resetAllData() {
    if(!confirm('⚠️ 重置将清空所有数据并恢复默认值，此操作不可逆！')) return;
    if(!confirm('再次确认：你将丢失所有自定义数据！')) return;
    Object.keys(DEFAULT_DATA).forEach(k => saveData(k, JSON.parse(JSON.stringify(DEFAULT_DATA[k]))));
    localStorage.removeItem('sms_backupHistory');
    addLog('系统数据完全重置为默认值');
    showToast('系统已重置为默认数据，即将刷新...');
    setTimeout(()=>location.reload(), 1500);
}

pageRenderers['system_monitor'] = function() {
    sysBakTab = 'monitor';
    if (currentPage === 'system_monitor') { currentPage = 'system_backup_mgmt'; return pageRenderers['system_backup_mgmt'](); }
    return pageRenderers['system_backup_mgmt']();
};
function refreshMonitor() {
    const configs = loadData('monitorConfigs');
    configs.forEach(c => {
        if (c.target === 'disk_usage') c.currentValue = (Math.floor(Math.random()*30)+30)+'%';
        else if (c.target === 'memory_usage') c.currentValue = (Math.floor(Math.random()*40)+35)+'%';
        else if (c.target === 'cpu_usage') c.currentValue = (Math.floor(Math.random()*50)+10)+'%';
        else if (c.target === 'database') c.currentValue = (Math.floor(Math.random()*5)) + '次重连';
        c.lastCheckTime = new Date().toLocaleString();
        c.status = (parseInt(c.currentValue)||0) > c.alertThreshold ? '告警' : '正常';
    });
    saveData('monitorConfigs', configs);
    if (currentPage === 'system_backup_mgmt') { if (sysBakTab === 'monitor') renderSysBakTabContent(); }
    else if (currentPage === 'system_monitor') navigateTo('system_monitor');
    addLog('数据监控刷新');
    showToast('监控数据已刷新');
}
function editMonitorConfig(cid) {
    const configs = loadData('monitorConfigs');
    const c = configs.find(x=>x.id===cid); if(!c) return;
    openModal('编辑监控配置 - '+c.name, `
        <div class="form-row"><div class="form-field"><label>监控项名称</label><input id="frmMcName" value="${c.name}"></div><div class="form-field"><label>检查间隔(秒)</label><input type="number" id="frmMcInterval" value="${c.checkInterval}"></div></div>
        <div class="form-row"><div class="form-field"><label>告警阈值</label><input type="number" id="frmMcThreshold" value="${c.alertThreshold}"></div><div class="form-field"><label>是否启用</label><select id="frmMcEnabled"><option value="true" ${c.enabled?'selected':''}>启用</option><option value="false" ${!c.enabled?'selected':''}>暂停</option></select></div></div>`,
        `<button class="btn btn-outline" onclick="closeModal()">取消</button><button class="btn btn-primary" onclick="doEditMonitor(${c.id})">保存</button>`);
}
function doEditMonitor(cid) {
    const configs = loadData('monitorConfigs');
    const c = configs.find(x=>x.id===cid); if(!c) return;
    c.name = document.getElementById('frmMcName').value;
    c.checkInterval = parseInt(document.getElementById('frmMcInterval').value)||60;
    c.alertThreshold = parseInt(document.getElementById('frmMcThreshold').value)||80;
    c.enabled = document.getElementById('frmMcEnabled').value === 'true';

    if (currentPage === 'system_backup_mgmt') { if (sysBakTab === 'monitor') renderSysBakTabContent(); }

    addLog(`编辑监控配置: ${c.name}`);
    showToast('监控配置已更新');

function toggleMonitor(cid) {

                            <td><span style="font-size:0.75rem;" title="${r.content}">${r.content.length>40?r.content.slice(0,40)+'...':r.content}</span></td>
                            <td>${r.operator}</td><td>${r.planDate}</td><td>${r.executeDate||'待定'}</td><td>${r.duration}</td>
                            <td><span class="badge ${r.status==='已完成'?'badge-on':r.status==='进行中'?'badge-warn':'badge-off'}">${r.status}</span></td>
                            <td class="action-links">
                                <span onclick="viewMaintenance('${r.id}')">查看</span>
                                <span onclick="editMaintenance('${r.id}')">编辑</span>
                                ${r.status==='计划中'?`<span onclick="executeMaintenance('${r.id}')">执行</span>`:''}
                            </td>
                        </tr>`).join('')}
                    </tbody>
                </table>
            </div>
        </div>
    </div>`;
};
function addMaintenance() {
    openModal('新增维护记录', `
        <div class="form-row"><div class="form-field"><label>版本号</label><input id="frmMtVersion" value="V${new Date().getFullYear()}.${String(new Date().getMonth()+1).padStart(2,'0')}.X"></div><div class="form-field"><label>类型</label><select id="frmMtType"><option>功能更新</option><option>安全更新</option><option>版本升级</option><option>漏洞修复</option><option>性能优化</option></select></div></div>
        <div class="form-field"><label>更新内容</label><textarea id="frmMtContent" rows="3" placeholder="请描述本次更新的具体内容..."></textarea></div>
        <div class="form-row"><div class="form-field"><label>计划日期</label><input type="date" id="frmMtPlanDate" value="${getToday()}"></div><div class="form-field"><label>预计耗时</label><input id="frmMtDuration" value="预计2小时"></div></div>`,
        `<button class="btn btn-outline" onclick="closeModal()">取消</button><button class="btn btn-primary" onclick="saveMaintenance()">保存</button>`);
}
function saveMaintenance() {
    const records = loadData('maintenanceRecords');
    const version = document.getElementById('frmMtVersion').value.trim();
    if(!version) { alert('版本号不能为空'); return; }
    records.push({ id: makeId(), version, type: document.getElementById('frmMtType').value, content: document.getElementById('frmMtContent').value, operator: currentUser?.name||'运维人员', planDate: document.getElementById('frmMtPlanDate').value, executeDate: '', duration: document.getElementById('frmMtDuration').value, status:'计划中', result:'', rollback:false });
    saveData('maintenanceRecords', records);
    closeModal(); navigateTo('system_maintenance');
    addLog(`新增维护计划: ${version}`);
    showToast('维护记录已添加');
}
function viewMaintenance(rid) {
    const records = loadData('maintenanceRecords');
    const r = records.find(x=>x.id===rid); if(!r) return;
    openModal('维护记录详情 - '+r.version, `
        <div style="font-size:0.85rem;line-height:2;">
            <p><strong>版本：</strong>${r.version}</p><p><strong>类型：</strong>${r.type}</p>
            <p><strong>操作人：</strong>${r.operator}</p><p><strong>计划日期：</strong>${r.planDate}</p>
            <p><strong>执行日期：</strong>${r.executeDate||'待执行'}</p><p><strong>耗时：</strong>${r.duration}</p>
            <p><strong>状态：</strong>${r.status}</p>
            <h4 style="margin-top:12px;">更新内容：</h4><p style="line-height:1.8;">${r.content}</p>
            ${r.result ? `<h4 style="margin-top:12px;">执行结果：</h4><p>${r.result}</p>` : ''}
            ${r.rollback ? '<p style="color:#c23d2e;">⚠ 已执行回滚操作</p>' : ''}
        </div>`, `<button class="btn btn-outline" onclick="closeModal()">关闭</button>`);
}
function editMaintenance(rid) {
    const records = loadData('maintenanceRecords');
    const r = records.find(x=>x.id===rid); if(!r) return;
    openModal('编辑维护记录 - '+r.version, `
        <div class="form-row"><div class="form-field"><label>版本号</label><input id="frmMtVersion" value="${r.version}"></div><div class="form-field"><label>类型</label><select id="frmMtType">${['功能更新','安全更新','版本升级','漏洞修复','性能优化'].map(t=>`<option ${t===r.type?'selected':''}>${t}</option>`).join('')}</select></div></div>
        <div class="form-field"><label>更新内容</label><textarea id="frmMtContent" rows="3">${r.content}</textarea></div>
        <div class="form-row"><div class="form-field"><label>计划日期</label><input type="date" id="frmMtPlanDate" value="${r.planDate}"></div><div class="form-field"><label>耗时</label><input id="frmMtDuration" value="${r.duration}"></div></div>
        <div class="form-row"><div class="form-field"><label>状态</label><select id="frmMtStatus"><option value="计划中" ${r.status==='计划中'?'selected':''}>计划中</option><option value="进行中" ${r.status==='进行中'?'selected':''}>进行中</option><option value="已完成" ${r.status==='已完成'?'selected':''}>已完成</option></select></div><div class="form-field"><label>执行结果</label><input id="frmMtResult" value="${r.result||''}"></div></div>`,
        `<button class="btn btn-outline" onclick="closeModal()">取消</button><button class="btn btn-primary" onclick="doEditMaintenance('${r.id}')">保存</button>`);
}
function doEditMaintenance(rid) {
    const records = loadData('maintenanceRecords');
    const r = records.find(x=>x.id===rid); if(!r) return;
    r.version = document.getElementById('frmMtVersion').value.trim();
    r.type = document.getElementById('frmMtType').value;
    r.content = document.getElementById('frmMtContent').value;
    r.planDate = document.getElementById('frmMtPlanDate').value;
    r.duration = document.getElementById('frmMtDuration').value;
    r.status = document.getElementById('frmMtStatus').value;
    r.result = document.getElementById('frmMtResult').value;
    saveData('maintenanceRecords', records);
    closeModal(); navigateTo('system_maintenance');
    addLog(`编辑维护记录: ${r.version}`);
    showToast('维护记录已更新');
}
function executeMaintenance(rid) {
    if(!confirm('确定标记此维护记录为"已完成"吗？')) return;
    const records = loadData('maintenanceRecords');
    const r = records.find(x=>x.id===rid); if(!r) return;
    r.status = '已完成';
    r.executeDate = new Date().toLocaleString();
    r.result = '更新成功，系统运行正常';
    saveData('maintenanceRecords', records);
    navigateTo('system_maintenance');
    addLog(`执行系统维护: ${r.version}`);
    showToast('维护记录已更新为已完成');
}

// ==================== 日志 ====================
function addLog(action) {
    const logs = loadData('systemLogs');
    logs.push({time: new Date().toLocaleString(), user: currentUser?.name||'系统', action});
    saveData('systemLogs', logs);
}
